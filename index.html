<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 强制手机竖屏、禁止缩放、仅移动端适配核心标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2000+网红视频流出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #121212;
            color: #fff;
            overflow-x: hidden;
        }
        /* PC端拦截提示，宽度大于768px直接隐藏内容 */
        @media screen and (min-width: 768px) {
            .mobile-wrap {
                display: none !important;
            }
            .pc-tip {
                display: flex !important;
            }
        }
        .pc-tip {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: #fff; /* 电脑提示文字颜色 */
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
        /* 移动端容器 */
        .mobile-wrap {
            min-height: 100vh;
        }
        /* 顶部大标题栏 */
        .top-header {
            position: sticky;
            top: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 24px 16px;
            border-bottom: 1px solid #333;
            z-index: 99;
        }
        .top-header h1 {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff; /* 顶部大标题文字颜色 */
        }
        /* 资讯列表容器 */
        .news-list {
            padding: 16px;
            padding-bottom: 80px;
        }
        /* 单条图文卡片 */
        .news-item {
            background: #1e1e1e;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer; /* 整块悬浮显示手型，图片+标题都可点击 */
        }
        .news-item-img {
            width: 100%;
            max-height: 220px;
            height: auto;
            object-fit: contain; /* 完整显示整张图片，不会裁切画面 */
            display: block;
            background-color: #0f0f0f; /* 图片上下留白深色填充，美观不突兀 */
        }
        .news-item-title {
            padding: 14px 16px;
            font-size: 18px;
            line-height: 1.5;
            color: #f0f0f0; /* 卡片标题文字颜色 */
        }
        /* 详情页（纯黑主题，默认隐藏） */
        .detail-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000; /* 纯黑色深色主题 */
            overflow-y: auto;
            display: none;
            padding: 20px 16px;
        }
        .detail-back {
            font-size: 16px;
            color: #999; /* 返回文字颜色 */
            margin-bottom: 20px;
            display: inline-block;
        }
        .detail-title {
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.4;
            color: #fff; /* 详情页标题颜色 */
        }
        .detail-img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .detail-content p {
            font-size: 17px;
            line-height: 1.7;
            color: #ddd; /* 详情正文文字颜色 */
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- PC电脑访问提示 -->
    <div class="pc-tip">
        请使用手机竖屏浏览器打开本网站，电脑端暂不支持访问
    </div>

    <!-- 手机端主页面：图文列表 -->
    <div class="mobile-wrap">
        <!-- 顶部大标题区域（自带换行） -->
        <div class="top-header">
            <h1>全网20000+热门网红视频<br>资讯合集</h1>
        </div>

        <!-- 图文列表5组，图片src统一用JS外部链接填充 -->
        <div class="news-list">
            <!-- 第1组 -->
            <div class="news-item" onclick="jumpLink(1)">
                <img class="news-item-img" id="img1" alt="配图1">
                <div class="news-item-title">800+网红视频流出合集</div>
            </div>
            <!-- 第2组 -->
            <div class="news-item" onclick="jumpLink(2)">
                <img class="news-item-img" id="img2" alt="配图2">
                <div class="news-item-title">800+网红视频流出合集</div>
            </div>
            <!-- 第3组 -->
            <div class="news-item" onclick="jumpLink(3)">
                <img class="news-item-img" id="img3" alt="配图3">
                <div class="news-item-title">800+网红视频流出合集</div>
            </div>
            <!-- 第4组 -->
            <div class="news-item" onclick="jumpLink(4)">
                <img class="news-item-img" id="img4" alt="配图4">
                <div class="news-item-title">800+网红视频流出合集</div>
            </div>
            <!-- 第5组 -->
            <div class="news-item" onclick="jumpLink(5)">
                <img class="news-item-img" id="img5" alt="配图5">
                <div class="news-item-title">800+网红视频流出合集</div>
            </div>
        </div>

        <!-- 详情页：纯黑色背景 -->
        <div class="detail-page" id="detailBox">
            <div class="detail-back" onclick="closeDetail()">← 返回列表</div>
            <h2 class="detail-title" id="detailTitle">文章标题</h2>
            <img class="detail-img" id="detailImg" src="" alt="详情大图">
            <div class="detail-content" id="detailText">
                <p>这里是文章正文内容，纯黑色背景，白色文字，竖屏上下滑动浏览。</p>
                <p>页面仅支持手机竖屏打开，电脑访问会弹出拦截提示。</p>
                <p>排版类似Word文档，图文分段宽松，深色护眼模式。</p>
            </div>
        </div>
    </div>

    <script>
        // =====================【1、修改每组外部图片链接，这里全部替换】=====================
        const imgUrlList = {
            1: "https://i.postimg.cc/Vk9sK2mw/2.jpg", // 第1张外部图链接
            2: "https://i.postimg.cc/7Z1PKjwr/1.jpg", // 第2张外部图链接
            3: "https://i.postimg.cc/K87c0CxF/3.jpg", // 第3张外部图链接
            4: "https://i.postimg.cc/5259sDbb/4.jpg", // 第4张外部图链接
            5: "https://i.postimg.cc/wj5xwng9/5.jpg"  // 第5张外部图链接
        };
        // =============================================================================

        // =====================【2、修改每组跳转外链，这里替换网址】=====================
        const linkList = {
            1: "https://link1.example.com", // 第1组跳转地址
            2: "https://link2.example.com", // 第2组跳转地址
            3: "https://link3.example.com", // 第3组跳转地址
            4: "https://link4.example.com", // 第4组跳转地址
            5: "https://link5.example.com"  // 第5组跳转地址
        };
        // =====================================================================

        // 页面加载自动赋值外部图片
        window.onload = function(){
            document.getElementById("img1").src = imgUrlList[1];
            document.getElementById("img2").src = imgUrlList[2];
            document.getElementById("img3").src = imgUrlList[3];
            document.getElementById("img4").src = imgUrlList[4];
            document.getElementById("img5").src = imgUrlList[5];
        }

        // 跳转函数：新标签页打开链接
        function jumpLink(num) {
            window.open(linkList[num], "_blank");
            // 当前页面跳转替换上面：window.location.href = linkList[num];
        }

        // 备用文章数据
        const articleData = {
            1: {
                title: "瘫痪嫁法国老头真相大白11个月，42岁李宇春近况曝光，状态太意外",
                img: imgUrlList[1],
                text: `<p>正文第一段内容，适配纯黑深色页面，竖屏滑动阅读。</p>`
            },
            2: {
                title: "2026高考志愿填报指南来了！填报技巧一次性讲清",
                img: imgUrlList[2],
                text: `<p>高考志愿填报完整攻略，图文结合排版。</p>`
            },
            3: {
                title: "四川：“雪山草地”新跨越，乡村振兴全新进展",
                img: imgUrlList[3],
                text: `<p>四川发展相关资讯正文，分段排版类似Word文档。</p>`
            },
            4: {
                title: "第4条资讯标题，自行修改",
                img: imgUrlList[4],
                text: `<p>第4条资讯正文，可自由编辑。</p>`
            },
            5: {
                title: "第5条资讯标题，自行修改",
                img: imgUrlList[5],
                text: `<p>第5条资讯正文，可自由编辑。</p>`
            }
        }

        function openDetail(id) {
            const data = articleData[id];
            document.getElementById('detailTitle').innerText = data.title;
            document.getElementById('detailImg').src = data.img;
            document.getElementById('detailText').innerHTML = data.text;
            document.getElementById('detailBox').style.display = 'block';
            document.getElementById('detailBox').scrollTop = 0;
        }
        function closeDetail() {
            document.getElementById('detailBox').style.display = 'none';
        }
    </script>
</body>
</html>
